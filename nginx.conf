worker_processes auto;

events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Allowed 16 domains
    map $host $backend_host {
        fhfae.erwan.fun   fhfae.erwan.fun;
        gcahc.erwan.fun   gcahc.erwan.fun;
        gbdba.erwan.fun   gbdba.erwan.fun;
        fbhce.erwan.fun   fbhce.erwan.fun;
        aabhg.erwan.fun   aabhg.erwan.fun;
        afggg.erwan.fun   afggg.erwan.fun;
        hijej.erwan.fun   hijej.erwan.fun;
        aabge.erwan.fun   aabge.erwan.fun;
        egada.erwan.fun   egada.erwan.fun;
        fibih.erwan.fun  fibih.erwan.fun;
        gedcd.erwan.fun  gedcd.erwan.fun;
        fbfef.erwan.fun  fbfef.erwan.fun;
        default "";
    }

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # block unknown hosts
        if ($backend_host = "") {
            return 403;
        }

        # root path
        location = / {
            if ($http_upgrade != "") {
                rewrite ^ /ovpn break;
                proxy_pass https://$backend_host;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $backend_host;
                proxy_set_header X-Target-Protocol openvpn;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_ssl_server_name on;
                proxy_ssl_name $backend_host;
                proxy_ssl_verify off;
                break;
            }

            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # SSH
        location = /ssh {
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol ssh;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }

        # VLESS
        location = /vless {
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }

        # VMESS
        location = /vmess {
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }
    }
}
