worker_processes auto;

events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        location /viper-p {
            proxy_pass https://cegeb.mindfreak.online/ssh;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host adcdc.mindfreak.online;
            proxy_set_header X-Target-Protocol ssh;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /v-panel {
            proxy_pass https://cegeb.mindfreak.online/ovpn;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol openvpn;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vless {
            proxy_pass https://cegeb.mindfreak.online/vless;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol tls;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vmess {
            proxy_pass https://cegeb.mindfreak.online/vmess;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol tls;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location / {
            proxy_pass https://cegeb.mindfreak.online/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol ssh;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }
    }
}
