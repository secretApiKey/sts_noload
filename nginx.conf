worker_processes auto;

events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_upgrade $route_root {
        default @ovpn_ws;
        ''      @web_root;
    }

    map $host $backend_host {
        ~^[a-z0-9-]+\.erwan\.fun$ $host;
        default fhfae.erwan.fun;
    }

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        location = / {
            try_files /does-not-exist $route_root;
        }

        location @web_root {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location @ovpn_ws {
            rewrite ^ /ovpn break;
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol openvpn;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }

        location = /ssh {
            rewrite ^ /ssh break;
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol ssh;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }

        location = /vless {
            rewrite ^ /vless break;
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }

        location = /vmess {
            rewrite ^ /vmess break;
            proxy_pass https://$backend_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_ssl_verify off;
        }
    }
}
